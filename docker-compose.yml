services:
  api:
    build: .
    container_name: inventory_api
    command: daphne -b 0.0.0.0 -p 8000 inventory.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      DJANGO_ENV: dev
    depends_on:
      - db

  worker:
    build: .
    container_name: inventory_worker
    command: celery -A inventory worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.dev
    environment:
      DJANGO_ENV: dev
      DJANGO_SETTINGS_MODULE: inventory.settings
    depends_on:
      - redis
      - api

  beat:
    build: .
    container_name: inventory_beat
    command: >
      celery -A inventory beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env.dev
    environment:
      DJANGO_ENV: dev
      DJANGO_SETTINGS_MODULE: inventory.settings
    depends_on:
      - redis
      - api

  db:
    image: postgres:15
    container_name: inventory_db
    ports:
      - "5432:5432"
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory}
      POSTGRES_USER: ${DB_USER:-inventory}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventory}
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: inventory_redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: inventory_nginx
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./localhost+2.crt:/etc/nginx/certs/localhost.crt:ro
      - ./localhost+2.key:/etc/nginx/certs/localhost.key:ro
    depends_on:
      - api

volumes:
  inventory_postgres_data:
