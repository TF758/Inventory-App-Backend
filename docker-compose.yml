services:
  api:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 inventory.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A inventory worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.dev
    depends_on:
      - redis
      - api

  beat:
    build: .
    command: celery -A inventory beat -l info
    volumes:
      - .:/app
    env_file:
      - .env.dev
    depends_on:
      - redis
      - api

  db:
    image: postgres:15
    env_file:
      - ${ENV_FILE:-.env.dev}
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./localhost+2.crt:/etc/nginx/certs/localhost.crt:ro
      - ./localhost+2.key:/etc/nginx/certs/localhost.key:ro
    depends_on:
      - api

volumes:
  inventory_postgres_data:
