name: Django Test Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r . -c .bandit

      - name: Run dependency vulnerability scan
        run: pip-audit

  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        suite:
          - db_inventory.tests
          - data_import.tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Create CI environment file
        run: |
          echo "DJANGO_ENV=dev" >> .env.dev
          echo "DEBUG=True" >> .env.dev
          echo "SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars" >> .env.dev
          echo "DB_NAME=inventory" >> .env.dev
          echo "DB_USER=inventory" >> .env.dev
          echo "DB_PASSWORD=inventory" >> .env.dev
          echo "SESSION_IDLE_MINUTES=30" >> .env.dev
          echo "SESSION_ABSOLUTE_HOURS=8" >> .env.dev

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for database
        run: |
          until docker compose exec -T db pg_isready -U inventory; do
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T api python manage.py migrate

      - name: Run tests with coverage
        run: |
          docker compose exec -T api coverage run --parallel-mode manage.py test ${{ matrix.suite }} --parallel

      - name: Collect coverage files
        run: |
          mkdir coverage-files
          docker compose exec -T api sh -c "ls -a /app/.coverage*"
          docker compose exec -T api sh -c "for f in /app/.coverage*; do cp \$f /tmp/; done"
          docker compose cp api:/tmp/.coverage* coverage-files/ || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: coverage-files/.coverage*

  coverage:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Install coverage
        run: pip install coverage

      - name: Combine coverage results
        run: |
          mkdir -p coverage
          find coverage -name ".coverage*" -exec cp {} . \; || true

          if ls .coverage* 1> /dev/null 2>&1; then
            coverage combine
            coverage report --fail-under=70
            coverage html
          else
            echo "No coverage files found"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov
