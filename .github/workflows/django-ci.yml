name: Django Test Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r . -c .bandit

      - name: Run dependency vulnerability scan
        run: pip-audit

  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        suite:
          - db_inventory.tests
          - data_import.tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "DJANGO_ENV=dev" >> .env.dev
          echo "DEBUG=True" >> .env.dev
          echo "SECRET_KEY=ci-secret-key" >> .env.dev
          echo "DB_NAME=inventory" >> .env.dev
          echo "DB_USER=inventory" >> .env.dev
          echo "DB_PASSWORD=inventory" >> .env.dev
          echo "SESSION_IDLE_MINUTES=30" >> .env.dev
          echo "SESSION_ABSOLUTE_HOURS=8" >> .env.dev

      - name: Enable Docker BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for database
        run: |
          until docker compose exec -T db pg_isready -U inventory; do
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T api python manage.py migrate

      - name: Run tests with coverage (parallel)
        run: |
          docker compose exec -T api coverage run manage.py test ${{ matrix.suite }} --parallel
          docker compose exec -T api coverage report --fail-under=70
          docker compose exec -T api coverage html

      - name: Copy coverage report
        run: docker compose cp api:/app/htmlcov ./htmlcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: htmlcov
