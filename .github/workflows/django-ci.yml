name: Backend CI Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r . -c .bandit -ll

      - name: Run dependency vulnerability scan
        run: pip-audit --progress-spinner off

  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker compose build api

  tests:
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        suite:
          - core.tests
          - data_import.tests
          - reporting.tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI environment file
        run: |
          echo "DJANGO_ENV=dev" >> .env.dev
          echo "DEBUG=True" >> .env.dev
          echo "SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars" >> .env.dev
          echo "DB_NAME=inventory" >> .env.dev
          echo "DB_USER=inventory" >> .env.dev
          echo "DB_PASSWORD=inventory" >> .env.dev
          echo "SESSION_IDLE_MINUTES=30" >> .env.dev
          echo "SESSION_ABSOLUTE_HOURS=8" >> .env.dev

      - name: Start services
        run: docker compose up -d

      - name: Wait for database
        run: |
          for i in {1..30}; do
            docker compose exec -T db pg_isready -U inventory && break
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T api python manage.py migrate

      - name: Run tests with coverage
        run: |
          docker compose exec -T api coverage run --parallel-mode manage.py test ${{ matrix.suite }} --parallel

      - name: Extract coverage files from container
        run: |
          mkdir coverage-files
          docker compose exec -T api sh -c "cp /app/.coverage* /tmp/ || true"
          docker compose cp api:/tmp/. coverage-files/ || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: coverage-files/.coverage*

  coverage:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Install coverage
        run: pip install coverage

      - name: Combine coverage results
        run: |
          echo "Searching for coverage files..."

          find coverage -type f -name ".coverage*" -exec cp {} . \; || true

          if ls .coverage* 1> /dev/null 2>&1; then
            coverage combine
            coverage report -m --fail-under=50
            coverage html

            echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
            coverage report >> $GITHUB_STEP_SUMMARY
          else
            echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "No coverage files found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov
