name: Backend CI Suite

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            requirements/test.txt
            requirements/security.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Run Bandit
        run: python -m bandit -r . -c .bandit -ll

      - name: Run pip-audit
        run: |
          python -m pip_audit \
            -r requirements/base.txt \
            --progress-spinner off \
            --ignore-vuln CVE-2026-42304

  hadolint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  trivy-fs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  build-image:
    needs:
      - gitleaks
      - security
      - hadolint
      - trivy-fs

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: inventory-api:ci
          outputs: type=docker,dest=/tmp/inventory-api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-api-image
          path: /tmp/inventory-api.tar
          retention-days: 1

  deploy-check:
    needs: build-image

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-api-image

      - name: Load image
        run: docker load -i inventory-api.tar

      - name: Create CI environment file
        run: |
          cat <<EOF > .env.dev
          DJANGO_ENV=dev
          DEBUG=True
          SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars

          POSTGRES_DB=inventory
          POSTGRES_USER=inventory
          POSTGRES_PASSWORD=inventory

          DB_NAME=inventory
          DB_USER=inventory
          DB_PASSWORD=inventory
          DB_HOST=db
          DB_PORT=5432

          SESSION_IDLE_MINUTES=30
          SESSION_ABSOLUTE_HOURS=8
          EOF

      - name: Run Django deployment checks
        run: |
          docker compose run --rm api \
            python manage.py check \
            --deploy \
            --settings=inventory.settings.prod

  tests:
    needs: deploy-check

    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        suite:
          - core.tests
          - assignments.tests
          - data_import.tests
          - reporting.tests
          - users.tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-api-image

      - name: Load image
        run: docker load -i inventory-api.tar

      - name: Create CI environment file
        run: |
          cat <<EOF > .env.dev
          DJANGO_ENV=dev
          DEBUG=True
          SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars

          POSTGRES_DB=inventory
          POSTGRES_USER=inventory
          POSTGRES_PASSWORD=inventory

          DB_NAME=inventory
          DB_USER=inventory
          DB_PASSWORD=inventory
          DB_HOST=db
          DB_PORT=5432

          SESSION_IDLE_MINUTES=30
          SESSION_ABSOLUTE_HOURS=8
          EOF

      - name: Start DB + Redis
        run: docker compose up -d db redis

      - name: Wait for database
        run: |
          until docker compose exec -T db pg_isready -U inventory; do
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: docker compose run --rm api python manage.py migrate

      - name: Run tests
        run: |
          docker compose run --rm api \
            python manage.py test ${{ matrix.suite }} --parallel

      - name: Shutdown services
        if: always()
        run: docker compose down -v

  trivy-image:
    needs: tests

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: inventory-api-image

      - name: Load image
        run: docker load -i inventory-api.tar

      - name: Verify image exists
        run: docker image inspect inventory-api:ci

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: inventory-api:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"
