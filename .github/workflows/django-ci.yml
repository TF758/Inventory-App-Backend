name: Backend CI Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install security tools
        run: python -m pip install bandit pip-audit

      - name: Verify pip version
        run: python -m pip --version

      - name: Run Bandit
        run: python -m bandit -r . -c .bandit -ll

      - name: Run pip-audit
        run: python -m pip_audit -r requirements.txt --progress-spinner off

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        suite:
          - core.tests
          - assignments.tests
          - data_import.tests
          - reporting.tests
          - users.tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI environment file
        run: |
          echo "DJANGO_ENV=dev" >> .env.dev
          echo "DEBUG=True" >> .env.dev
          echo "SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars" >> .env.dev

          echo "POSTGRES_DB=inventory" >> .env.dev
          echo "POSTGRES_USER=inventory" >> .env.dev
          echo "POSTGRES_PASSWORD=inventory" >> .env.dev

          echo "DB_NAME=inventory" >> .env.dev
          echo "DB_USER=inventory" >> .env.dev
          echo "DB_PASSWORD=inventory" >> .env.dev
      - name: Start services
        run: docker compose up -d --build --force-recreate --renew-anon-volumes

      - name: Wait for database
        run: |
          for i in {1..15}; do
            docker compose exec -T db pg_isready -U inventory && break
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T api python manage.py migrate

      - name: Run tests
        run: docker compose exec -T api python manage.py test ${{ matrix.suite }} --parallel

      - name: Shutdown services
        if: always()
        run: docker compose down -v

  coverage:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI environment file
        run: |
          echo "DJANGO_ENV=dev" >> .env.dev
          echo "DEBUG=True" >> .env.dev
          echo "SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars" >> .env.dev
          echo "DB_NAME=inventory" >> .env.dev
          echo "DB_USER=inventory" >> .env.dev
          echo "DB_PASSWORD=inventory" >> .env.dev
          echo "SESSION_IDLE_MINUTES=30" >> .env.dev
          echo "SESSION_ABSOLUTE_HOURS=8" >> .env.dev

      - name: Start services
        run: docker compose up -d --build --force-recreate --renew-anon-volumes

      - name: Wait for database
        run: |
          for i in {1..15}; do
            docker compose exec -T db pg_isready -U inventory && break
            sleep 2
          done

      - name: Run migrations
        run: docker compose exec -T api python manage.py migrate

      - name: Run full test suite with coverage
        run: docker compose exec -T api coverage run manage.py test --parallel

      - name: Show coverage report
        run: docker compose exec -T api coverage report -m --fail-under=30

      - name: Shutdown services
        if: always()
        run: docker compose down -v
