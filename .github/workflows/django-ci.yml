name: Django Test Suite

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "DJANGO_ENV=dev" >> .env.dev
          echo "DEBUG=True" >> .env.dev
          echo "SECRET_KEY=ci-secret-key" >> .env.dev
          echo "DB_NAME=inventory" >> .env.dev
          echo "DB_USER=inventory" >> .env.dev
          echo "DB_PASSWORD=inventory" >> .env.dev
          echo "SESSION_IDLE_MINUTES=30" >> .env.dev
          echo "SESSION_ABSOLUTE_HOURS=8" >> .env.dev

      - name: Enable Docker BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Build containers
        run: docker compose build

      - name: Start database and redis
        run: docker compose up -d db redis

      - name: Run migrations
        run: docker compose run --rm api python manage.py migrate

      - name: Run tests
        run: docker compose run --rm api python manage.py test --parallel
