name: Backend CI Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Run Bandit
        run: python -m bandit -r . -c .bandit -ll

      # Twisted is used indirectly via Daphne/Channels.
      # CVE-2026-42304 affects twisted.names DNS handling.
      # Current application does not expose DNS services.
      # Temporary ignore until stable upstream fix is available.
      #
      # References:
      # https://nvd.nist.gov/general/cve-process
      # https://www.fortinet.com/uk/resources/cyberglossary/cve

      - name: Run pip-audit
        run: |
          python -m pip_audit \
            -r requirements.txt \
            --progress-spinner off \
            --ignore-vuln CVE-2026-42304

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        suite:
          - core.tests
          - assignments.tests
          - data_import.tests
          - reporting.tests
          - users.tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Create env file (fixed)
      - name: Create CI environment file
        run: |
          cat <<EOF > .env.dev
          DJANGO_ENV=dev
          DEBUG=True
          SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars

          POSTGRES_DB=inventory
          POSTGRES_USER=inventory
          POSTGRES_PASSWORD=inventory

          DB_NAME=inventory
          DB_USER=inventory
          DB_PASSWORD=inventory
          DB_HOST=db
          DB_PORT=5432

          SESSION_IDLE_MINUTES=30
          SESSION_ABSOLUTE_HOURS=8
          EOF

      - name: Build images
        run: docker compose build

      - name: Start DB + Redis
        run: docker compose up -d db redis

      - name: Wait for database
        run: |
          until docker compose exec -T db pg_isready -U inventory; do
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: docker compose run --rm api python manage.py migrate

      - name: Run tests
        run: docker compose run --rm api python manage.py test ${{ matrix.suite }} --parallel

      - name: Shutdown services
        if: always()
        run: docker compose down -v

  coverage:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI environment file
        run: |
          cat <<EOF > .env.dev
          DJANGO_ENV=dev
          DEBUG=True
          SECRET_KEY=ci-secret-key-for-testing-at-least-32-chars

          POSTGRES_DB=inventory
          POSTGRES_USER=inventory
          POSTGRES_PASSWORD=inventory

          DB_NAME=inventory
          DB_USER=inventory
          DB_PASSWORD=inventory
          DB_HOST=db
          DB_PORT=5432

          SESSION_IDLE_MINUTES=30
          SESSION_ABSOLUTE_HOURS=8
          EOF

      - name: Build images
        run: docker compose build

      - name: Start DB + Redis
        run: docker compose up -d db redis

      - name: Wait for database
        run: |
          until docker compose exec -T db pg_isready -U inventory; do
            echo "Waiting for database..."
            sleep 2
          done

      - name: Run migrations
        run: docker compose run --rm api python manage.py migrate

      - name: Run full test suite with coverage
        run: docker compose run --rm api coverage run manage.py test --parallel

      - name: Show coverage report
        run: docker compose run --rm api coverage report -m --fail-under=30

      - name: Shutdown services
        if: always()
        run: docker compose down -v
