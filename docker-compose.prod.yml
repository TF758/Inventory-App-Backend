services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod

    command: daphne -b 0.0.0.0 -p 8000 inventory.asgi:application

    ports:
      - "8000:8000"

    env_file:
      - .env.prod

    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod

    command: celery -A inventory worker -l info

    env_file:
      - .env.prod

    depends_on:
      - redis
      - api

  beat:
    build:
      context: .
      dockerfile: Dockerfile.prod

    command: celery -A inventory beat -l info

    env_file:
      - .env.prod

    depends_on:
      - redis
      - api

  db:
    image: postgres:15
    env_file:
      - .env.prod
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  inventory_postgres_data:
